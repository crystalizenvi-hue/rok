<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KvK Analytics</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; }
        .container { overflow: hidden; height: 100vh; width: 100vw; position: relative; }
        iframe { 
            width: 100%; 
            height: calc(100% + 50px); /* Melebihkan tinggi untuk memotong banner */
            margin-top: -60px; /* Menggeser banner ke atas agar tersembunyi */
            border: none; 
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://script.google.com/macros/s/AKfycby4HQbUF7sbjnIHUBBoNbQdYOeHI8kF4reUnNkWo4HHr_3sXufbIXib8P8FNzUymq_X/exec"></iframe>
    </div>
</body>
</html>
